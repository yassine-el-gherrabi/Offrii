version: 2
updates:
  - package-ecosystem: cargo
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 10
    groups:
      rust-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: swift
    directory: /frontend/ios/Offrii
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci):"
    groups:
      actions-all:
        update-types: ["minor", "patch"]
