name: Deploy Staging

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - "docker-compose.staging.yml"
      - "infra/**"
      - ".github/workflows/deploy-staging.yml"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yassine-el-gherrabi/offrii-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Pre-pull testcontainers images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7 &
          wait
      - name: Run tests
        run: cargo nextest run --workspace

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_NAME }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/offrii

            # Generate .env.staging from GitHub secrets/variables
            cat > /opt/offrii/.env.staging << 'ENVEOF'
            # Auto-generated by GitHub Actions — do not edit manually
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            RUST_LOG=${{ vars.RUST_LOG }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ vars.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ vars.R2_PUBLIC_URL }}
            APNS_KEY_ID=${{ vars.APNS_KEY_ID }}
            APNS_TEAM_ID=${{ vars.APNS_TEAM_ID }}
            APNS_BUNDLE_ID=${{ vars.APNS_BUNDLE_ID }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            CADDY_SITE_ADDRESS=staging.offrii.com
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
            ENVEOF
            chmod 600 /opt/offrii/.env.staging

            # Decode key files (shared with prod)
            echo '${{ secrets.JWT_PRIVATE_KEY_BASE64 }}' | base64 -d > /opt/offrii/secrets/jwt_private.pem
            echo '${{ secrets.JWT_PUBLIC_KEY_BASE64 }}' | base64 -d > /opt/offrii/secrets/jwt_public.pem
            echo '${{ secrets.APNS_KEY_BASE64 }}' | base64 -d > /opt/offrii/secrets/apns_key.p8
            chmod 600 /opt/offrii/secrets/*

            # Pull staging image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -p offrii-staging -f docker-compose.staging.yml pull staging-backend

            # Run migrations before deploy
            echo "Running database migrations..."
            docker compose -p offrii-staging -f docker-compose.staging.yml --env-file .env.staging run --rm --no-deps staging-backend migrate || {
              echo "Migration failed — aborting deploy"
              exit 1
            }

            # Deploy staging
            docker compose -p offrii-staging -f docker-compose.staging.yml --env-file .env.staging up -d --no-build

            # Health check — wait up to 60s
            echo "Waiting for staging health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3001/health/ready > /dev/null 2>&1; then
                echo "Staging health check passed."
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            echo "Staging health check failed."
            exit 1
