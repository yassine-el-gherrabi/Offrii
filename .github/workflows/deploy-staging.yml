name: Deploy Staging

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - "docker-compose.staging.yml"
      - "infra/**"
      - ".github/workflows/deploy-staging.yml"

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yassinelechef/offrii-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Pre-pull testcontainers images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7 &
          wait
      - name: Run tests
        run: cargo nextest run --workspace

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_NAME }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/offrii

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -p offrii-staging -f docker-compose.staging.yml pull staging-backend

            docker compose -p offrii-staging -f docker-compose.staging.yml --env-file .env.staging up -d --no-build

            # Health check — wait up to 60s
            echo "Waiting for staging health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3001/health/ready > /dev/null 2>&1; then
                echo "Staging health check passed."
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            echo "Staging health check failed."
            exit 1
