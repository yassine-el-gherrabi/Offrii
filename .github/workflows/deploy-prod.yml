name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "infra/**"
      - ".github/workflows/deploy-prod.yml"

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # never cancel a running production deploy

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yassinelechef/offrii-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Pre-pull testcontainers images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7 &
          wait
      - name: Run tests
        run: cargo nextest run --workspace

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/offrii

            # Pull new image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend

            # Store current image for rollback
            CURRENT_IMAGE=$(docker inspect --format='{{.Image}}' offrii-backend 2>/dev/null || echo "")

            # Deploy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

            # Health check — wait up to 60 seconds
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/health/ready > /dev/null 2>&1; then
                echo "Health check passed."
                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            # Rollback on failure
            echo "Health check failed — rolling back..."
            if [ -n "$CURRENT_IMAGE" ]; then
              docker compose -f docker-compose.yml -f docker-compose.prod.yml down backend
              docker tag "$CURRENT_IMAGE" ghcr.io/yassinelechef/offrii-api:latest || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
              echo "Rollback complete."
            fi
            exit 1
