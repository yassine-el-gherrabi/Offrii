name: Deploy Hotfix

on:
  push:
    branches: ["hotfix/*", "hotfix/**"]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/yassine-el-gherrabi/offrii-api

jobs:
  quick-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Compile check
        run: cargo check --workspace

  build:
    needs: quick-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy hotfix to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/offrii

            # Generate .env from GitHub secrets/variables
            cat > /opt/offrii/.env << 'ENVEOF'
            # Auto-generated by GitHub Actions — do not edit manually
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            RUST_LOG=${{ vars.RUST_LOG }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ vars.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ vars.R2_PUBLIC_URL }}
            APNS_KEY_ID=${{ vars.APNS_KEY_ID }}
            APNS_TEAM_ID=${{ vars.APNS_TEAM_ID }}
            APNS_BUNDLE_ID=${{ vars.APNS_BUNDLE_ID }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            CADDY_SITE_ADDRESS=api.offrii.com
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
            ENVEOF
            # Write bcrypt hash separately (contains $ signs that break heredoc)
            printf 'GRAFANA_BASIC_AUTH_HASH=%s\n' '${{ secrets.GRAFANA_BASIC_AUTH_HASH }}' >> /opt/offrii/.env
            chmod 600 /opt/offrii/.env

            # Decode key files from base64
            echo '${{ secrets.JWT_PRIVATE_KEY_BASE64 }}' | base64 -d > /opt/offrii/secrets/jwt_private.pem
            echo '${{ secrets.JWT_PUBLIC_KEY_BASE64 }}' | base64 -d > /opt/offrii/secrets/jwt_public.pem
            echo '${{ secrets.APNS_KEY_BASE64 }}' | base64 -d > /opt/offrii/secrets/apns_key.p8
            chmod 600 /opt/offrii/secrets/*

            # Pull new image
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend

            # Store current image for rollback
            CURRENT_IMAGE=$(docker inspect --format='{{.Image}}' offrii-backend 2>/dev/null || echo "")

            # Run migrations before deploy (fails fast if schema change breaks)
            echo "Running database migrations..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm --no-deps backend migrate || {
              echo "Migration failed — aborting deploy"
              exit 1
            }

            # Deploy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build

            # Health check — wait up to 60 seconds
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost/health/ready > /dev/null 2>&1 || curl -sf https://api.offrii.com/health/ready > /dev/null 2>&1; then
                echo "Health check passed."

                # Annotate deploy on Grafana dashboard
                curl -sf -X POST http://localhost:3001/api/annotations \
                  -H "Authorization: Basic $(echo -n 'admin:${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}' | base64)" \
                  -H "Content-Type: application/json" \
                  -d '{"text":"HOTFIX ${{ github.sha }}","tags":["deploy","prod","hotfix"]}' \
                  || echo "Grafana annotation failed (non-blocking)"

                docker image prune -f
                exit 0
              fi
              echo "Attempt $i/12 — waiting 5s..."
              sleep 5
            done

            # Rollback on failure
            echo "Health check failed — rolling back..."
            if [ -n "$CURRENT_IMAGE" ]; then
              docker compose -f docker-compose.yml -f docker-compose.prod.yml down backend
              docker tag "$CURRENT_IMAGE" ${{ env.IMAGE_NAME }}:latest || true
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
              echo "Rollback complete."
            fi
            exit 1
