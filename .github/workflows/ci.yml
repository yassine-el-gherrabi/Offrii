name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort,cargo-machete,cargo-nextest,cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check Cargo.toml sorting
        run: cargo sort --workspace --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Check unused dependencies
        run: cargo machete
      - name: Pre-pull testcontainers images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7 &
          wait
      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --fail-under-lines 75 --ignore-filename-regex "(main|migrate)\.rs$"

  ios:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: macos-15
    defaults:
      run:
        working-directory: frontend/ios
    steps:
      - uses: actions/checkout@v4
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-deriveddata-${{ hashFiles('frontend/ios/Offrii.xcodeproj/project.pbxproj') }}
          restore-keys: xcode-deriveddata-
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict Offrii/
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Offrii.xcodeproj \
            -scheme Offrii \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Offrii.xcodeproj \
            -scheme Offrii \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
