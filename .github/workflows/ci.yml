name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  branch-gate:
    if: github.event_name == 'pull_request' && github.base_ref == 'master' && github.head_ref != 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Block PRs to master from non-develop branches
        run: |
          echo "::error::PRs to master must come from develop. Current source: ${{ github.head_ref }}"
          exit 1

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort,cargo-machete,cargo-nextest,cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend -> target
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check Cargo.toml sorting
        run: cargo sort --workspace --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Check unused dependencies
        run: cargo machete
      - name: Pre-pull testcontainers images
        run: |
          docker pull postgres:16-alpine &
          docker pull redis:7 &
          wait
      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --fail-under-lines 75 --ignore-filename-regex "(main|migrate)\.rs$"
      - name: Security audit (advisory only)
        continue-on-error: true
        run: |
          cargo install cargo-audit --quiet
          cargo audit 2>&1 || echo "::warning::Security vulnerabilities found — check cargo audit output above"

  ios:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: macos-15
    defaults:
      run:
        working-directory: frontend/ios
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
      - name: Ensure iOS simulator runtime
        working-directory: .
        run: |
          if xcrun simctl list runtimes | grep -q "iOS.*18"; then
            echo "iOS simulator runtime already installed"
          else
            echo "Downloading iOS simulator runtime..."
            xcodebuild -downloadPlatform iOS
          fi
      - name: List available simulators
        working-directory: .
        run: xcrun simctl list devices available iOS
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-deriveddata-${{ hashFiles('frontend/ios/Offrii.xcodeproj/project.pbxproj') }}
          restore-keys: xcode-deriveddata-
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict Offrii/
      - name: Check TODOs/FIXMEs (advisory)
        continue-on-error: true
        run: |
          count=$(grep -rn "TODO\|FIXME\|HACK" Offrii/ --include="*.swift" | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count TODO/FIXME/HACK comments in Swift code:"
            grep -rn "TODO\|FIXME\|HACK" Offrii/ --include="*.swift" | head -20
          fi
      - name: Check unsafe unwraps (advisory)
        continue-on-error: true
        run: |
          count=$(grep -rn ' as! \| \.self!\|[^?]!' Offrii/ --include="*.swift" | grep -v '// swiftlint:disable' | grep -v 'iboutlet\|ibaction' -i | wc -l | tr -d ' ')
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count force unwrap/cast occurrences — consider using safe alternatives:"
            grep -rn ' as! \|\.self!' Offrii/ --include="*.swift" | head -20
          fi
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Offrii.xcodeproj \
            -scheme Offrii \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
      - name: Test with coverage
        run: |
          set -o pipefail
          xcodebuild test \
            -project Offrii.xcodeproj \
            -scheme Offrii \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
      - name: Coverage report (advisory)
        continue-on-error: true
        run: |
          xcrun xccov view --report TestResults.xcresult --json 2>/dev/null | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          targets = [t for t in data.get('targets', []) if 'Offrii' in t.get('name', '')]
          for t in targets:
              pct = t.get('lineCoverage', 0) * 100
              print(f\"Coverage {t['name']}: {pct:.1f}%\")
          " || echo "::warning::Could not parse coverage results"
