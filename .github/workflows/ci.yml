name: CI

on:
  push:
    branches: [master, feature/*, fix/*]
  pull_request:
    branches: [master]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -Dwarnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --all-features --workspace

      - name: Install cargo-sort, cargo-machete, cargo-audit
        run: cargo install cargo-sort cargo-machete cargo-audit

      - name: Check dependency sorting
        run: cargo sort -w --check

      - name: Check unused dependencies
        run: cargo machete

      - name: Audit vulnerabilities
        run: cargo audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build backend/ -f backend/Dockerfile --target builder

      - name: Build frontend image
        run: docker build frontend/ -f frontend/Dockerfile --target builder
