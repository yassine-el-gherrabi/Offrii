# Production override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Requires .env with: POSTGRES_PASSWORD, RESEND_API_KEY, OPENAI_API_KEY,
#   R2_*, APNS_*, GOOGLE_CLIENT_ID, GF_SECURITY_ADMIN_PASSWORD

services:
  postgres:
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      # Tune for CX32 (8 GB total, ~1 GB for PG)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=100
      - -c
      - log_min_duration_statement=500

  redis:
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    image: ghcr.io/yassine-el-gherrabi/offrii-api:${TAG:-latest}
    # image takes precedence over build from base; deploy uses --no-build
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-offrii}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-offrii}
      REDIS_URL: redis://redis:6379
      API_PORT: "3000"
      RUST_LOG: rest_api=info,tower_http=info
      JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public_key
      RESEND_API_KEY: ${RESEND_API_KEY}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-offrii-media}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      APNS_KEY_PATH: /run/secrets/apns_key
      APNS_KEY_ID: ${APNS_KEY_ID:-LTCYFUC4WT}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-6SMPW6NUXP}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-com.offrii.app}
      APNS_SANDBOX: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MODERATION_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGIN: "https://offrii.com"
    volumes:
      - /opt/offrii/secrets/jwt_private.pem:/run/secrets/jwt_private_key:ro
      - /opt/offrii/secrets/jwt_public.pem:/run/secrets/jwt_public_key:ro
      - /opt/offrii/secrets/apns_key.p8:/run/secrets/apns_key:ro
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  caddy:
    environment:
      CADDY_SITE_ADDRESS: "api.offrii.com"
      CORS_ORIGIN: "https://offrii.com"
    volumes:
      - ./infra/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Monitoring stack ─────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: offrii-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - offrii-net
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    image: grafana/loki:3.5.0
    container_name: offrii-loki
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - offrii-net
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.6.0
    container_name: offrii-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?Set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_SERVER_ROOT_URL: https://grafana.offrii.com
      GF_SERVER_HTTP_PORT: "3000"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - offrii-net
    deploy:
      resources:
        limits:
          memory: 512M

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: offrii-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - offrii-net
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
