global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Host metrics (CPU, memory, disk, network)
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Offrii backend application metrics
  # Uncomment when /metrics endpoint is implemented
  # - job_name: offrii-backend
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["backend:3000"]

  # Caddy reverse proxy metrics
  # Requires admin API enabled: servers > metrics in Caddyfile
  # - job_name: caddy
  #   static_configs:
  #     - targets: ["caddy:2019"]

  # PostgreSQL metrics via postgres_exporter
  # Add postgres-exporter service to docker-compose.prod.yml when needed
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis metrics via redis_exporter
  # Add redis-exporter service to docker-compose.prod.yml when needed
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
