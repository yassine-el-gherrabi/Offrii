apiVersion: 1

contactPoints:
  - orgId: 1
    name: default-email
    receivers:
      - uid: email-contact
        type: email
        settings:
          addresses: yassineelgherrabi@gmail.com
          singleEmail: true

policies:
  - orgId: 1
    receiver: default-email
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

groups:
  - orgId: 1
    name: infrastructure
    folder: ''
    interval: 1m
    rules:
      - uid: disk-usage-high
        title: Disk usage > 80%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: bfgni91bft340e
            model:
              expr: '100 - ((node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100)'
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
        for: 5m
        annotations:
          summary: 'Disk usage is above 80% on {{ $labels.instance }}'
        labels:
          severity: warning

      - uid: high-cpu
        title: CPU usage > 90% for 5min
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: bfgni91bft340e
            model:
              expr: '100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)'
              intervalMs: 60000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [90]
        for: 5m
        annotations:
          summary: 'CPU usage is above 90% for 5 minutes'
        labels:
          severity: critical
