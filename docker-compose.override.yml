services:
  api:
    build:
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - api-target:/app/target

  frontend:
    build:
      target: dev
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

volumes:
  cargo-registry:
  cargo-git:
  api-target:
